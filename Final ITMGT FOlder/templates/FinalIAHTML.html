<!DOCTYPE html>
<html>
<body>
    <h1>Order Entry</h1>
    <form action="/submit-order" method="POST">
        Customer: <input type="text" name="customer" required><br><br>
        Service: <input type="text" name="service" required><br><br>
        Reference No.: <input type="text" name="refno"><br><br>
        Time: <input type="text" name="time" placeholder="e.g. 2:30 PM"><br><br>
        <button type="submit">Submit Order</button>
    </form>
</body>
</html>
